# Cocon — accès par IP uniquement (sans domaine, sans HTTPS)
#
# Usage :
#   sudo cp deploy/nginx-jttof-ip.conf /etc/nginx/sites-available/jttof
#   sudo ln -sf /etc/nginx/sites-available/jttof /etc/nginx/sites-enabled/jttof
#   sudo htpasswd -c /etc/nginx/.htpasswd-jttof cocon
#   sudo nginx -t && sudo systemctl reload nginx
#
# Accès : http://168.231.85.64/  (ou http://IP:COCON_PORT si port ≠ 80)
#
# COCON_PORT : port public (défaut 80). Ex. 8080 si le 80 est déjà pris.

server {
    listen COCON_PORT default_server;
    listen [::]:COCON_PORT default_server;
    server_name 168.231.85.64 _;

    auth_basic           "Cocon";
    auth_basic_user_file /etc/nginx/.htpasswd-jttof;

    client_max_body_size 12M;

    access_log /var/log/nginx/jttof-access.log;
    error_log  /var/log/nginx/jttof-error.log;

    # Fichiers PWA / icônes : pas d'auth (le navigateur ne renvoie pas le Basic Auth)
    location = /manifest.json {
        auth_basic off;
        proxy_pass http://127.0.0.1:8765;
        proxy_set_header Host $host;
    }

    location = /favicon.ico {
        auth_basic off;
        proxy_pass http://127.0.0.1:8765/icons/favicon-32.png;
        proxy_set_header Host $host;
    }

    location ^~ /icons/ {
        auth_basic off;
        proxy_pass http://127.0.0.1:8765;
        proxy_set_header Host $host;
    }

    location / {
        proxy_pass http://127.0.0.1:8765;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}
