# Cocon — site Nginx (modèle)
#
# Phase 1 : HTTP uniquement (nginx -t OK sans certificat).
# Phase 2 : sudo certbot --nginx -d COCON_DOMAIN  → ajoute HTTPS automatiquement.
#
# 1. sed "s/COCON_DOMAIN/ton-domaine.fr/g" deploy/nginx-jttof.conf | sudo tee /etc/nginx/sites-available/jttof
# 2. sudo ln -sf /etc/nginx/sites-available/jttof /etc/nginx/sites-enabled/
# 3. sudo htpasswd -c /etc/nginx/.htpasswd-jttof cocon
# 4. sudo nginx -t && sudo systemctl reload nginx
# 5. sudo certbot --nginx -d ton-domaine.fr

server {
    listen 8080;
    listen [::]:8080;
    server_name COCON_DOMAIN _;

    # Let's Encrypt (certbot --nginx)
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    client_max_body_size 12M;

    access_log /var/log/nginx/jttof-access.log;
    error_log  /var/log/nginx/jttof-error.log;

    # ── Routes API : auth JWT, pas de Basic Auth ─────────────────────
    # /api/auth/* = login/register → jamais de Basic Auth
    # /api/*      = CRUD, protégé par JWT côté FastAPI
    location /api/ {
        auth_basic off;
        proxy_pass http://127.0.0.1:8765;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # ── Frontend statique ────────────────────────────────────────────
    location / {
        proxy_pass http://127.0.0.1:8765;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}
