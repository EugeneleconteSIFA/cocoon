# Cocon — site Nginx (modèle)
#
# 1. Remplacer COCON_DOMAIN par ton sous-domaine (ex. jttof.tondomaine.fr)
# 2. Copier : sudo cp deploy/nginx-jttof.conf /etc/nginx/sites-available/jttof
# 3. Activer : sudo ln -sf /etc/nginx/sites-available/jttof /etc/nginx/sites-enabled/
# 4. Créer le mot de passe : sudo htpasswd -c /etc/nginx/.htpasswd-jttof cocon
# 5. Certbot : sudo certbot --nginx -d COCON_DOMAIN
# 6. Tester : sudo nginx -t && sudo systemctl reload nginx

# Redirection HTTP → HTTPS (activer après Certbot)
server {
    listen 80;
    listen [::]:80;
    server_name COCON_DOMAIN;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name COCON_DOMAIN;

    # Certbot remplit ces lignes (ou décommenter après certbot)
    # ssl_certificate     /etc/letsencrypt/live/COCON_DOMAIN/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/COCON_DOMAIN/privkey.pem;
    # include /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Auth partagée (vous deux)
    auth_basic           "Cocon";
    auth_basic_user_file /etc/nginx/.htpasswd-jttof;

    client_max_body_size 12M;

    access_log /var/log/nginx/jttof-access.log;
    error_log  /var/log/nginx/jttof-error.log;

    # Tout passe par uvicorn (API + frontend statique)
    location / {
        proxy_pass http://127.0.0.1:8765;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}
