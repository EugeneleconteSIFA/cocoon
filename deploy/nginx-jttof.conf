# Cocon — Nginx (domaine + HTTPS)
#
# Installation :
#   sudo sed "s/COCON_DOMAIN/cocon.sbs/g" deploy/nginx-jttof.conf | sudo tee /etc/nginx/sites-available/jttof
#   sudo ln -sf /etc/nginx/sites-available/jttof /etc/nginx/sites-enabled/jttof
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d cocon.sbs -d www.cocon.sbs
#
# Pas de Basic Auth : l'auth est JWT côté FastAPI uniquement.

# Redirection HTTP → HTTPS (Certbot peut aussi gérer ce bloc)
server {
    listen 80;
    listen [::]:80;
    server_name COCON_DOMAIN www.COCON_DOMAIN;
    return 301 https://COCON_DOMAIN$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name COCON_DOMAIN www.COCON_DOMAIN;

    # Certbot remplit ou complète ces lignes :
    # ssl_certificate     /etc/letsencrypt/live/COCON_DOMAIN/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/COCON_DOMAIN/privkey.pem;
    # include /etc/letsencrypt/options-ssl-nginx.conf;

    client_max_body_size 12M;

    access_log /var/log/nginx/jttof-access.log;
    error_log  /var/log/nginx/jttof-error.log;

    # Canonique : www → apex (évite 2 localStorage / sessions séparées)
    if ($host = www.COCON_DOMAIN) {
        return 301 https://COCON_DOMAIN$request_uri;
    }

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location = /manifest.json {
        proxy_pass http://127.0.0.1:8765;
        proxy_set_header Host $host;
    }

    location = /favicon.ico {
        proxy_pass http://127.0.0.1:8765/icons/favicon-32.png;
        proxy_set_header Host $host;
    }

    location ^~ /icons/ {
        proxy_pass http://127.0.0.1:8765;
        proxy_set_header Host $host;
    }

    # API : jamais de Basic Auth — transmettre le JWT du navigateur
    location /api/ {
        proxy_pass http://127.0.0.1:8765;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization     $http_authorization;
        proxy_read_timeout 60s;
    }

    location / {
        proxy_pass http://127.0.0.1:8765;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}
