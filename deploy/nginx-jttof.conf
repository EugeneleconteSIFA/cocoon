# Cocon — Nginx (domaine cocon.sbs + HTTPS)
#
# Installation initiale :
#   sudo sed "s/COCON_DOMAIN/cocon.sbs/g" deploy/nginx-jttof.conf | sudo tee /etc/nginx/sites-available/jttof
#   sudo ln -sf /etc/nginx/sites-available/jttof /etc/nginx/sites-enabled/jttof
#   sudo rm -f /etc/nginx/sites-enabled/default   # si aucun autre site sur :80
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d cocon.sbs -d www.cocon.sbs
#
# Après certbot --expand (si "Could not install certificate") :
#   sudo certbot install --cert-name www.cocon.sbs
#   # ou vérifier que ssl_certificate pointe vers le chemin ci-dessous
#
# Pas de Basic Auth : l'auth est JWT côté FastAPI uniquement.

server {
    listen 80;
    listen [::]:80;
    server_name COCON_DOMAIN www.COCON_DOMAIN;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://COCON_DOMAIN$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name COCON_DOMAIN www.COCON_DOMAIN;

    # Certbot (nom du certificat souvent www.COCON_DOMAIN si créé ainsi)
    ssl_certificate     /etc/letsencrypt/live/www.COCON_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/www.COCON_DOMAIN/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;

    client_max_body_size 12M;

    access_log /var/log/nginx/jttof-access.log;
    error_log  /var/log/nginx/jttof-error.log;

    # Canonique : www → apex (une seule origine pour JWT / PWA)
    if ($host = www.COCON_DOMAIN) {
        return 301 https://COCON_DOMAIN$request_uri;
    }

    location = /manifest.json {
        proxy_pass http://127.0.0.1:8765;
        proxy_set_header Host $host;
    }

    location = /favicon.ico {
        proxy_pass http://127.0.0.1:8765/icons/favicon-32.png;
        proxy_set_header Host $host;
    }

    location ^~ /icons/ {
        proxy_pass http://127.0.0.1:8765;
        proxy_set_header Host $host;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:8765;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization     $http_authorization;
        proxy_read_timeout 60s;
    }

    location / {
        proxy_pass http://127.0.0.1:8765;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}
